<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Apps - Punkouter Software</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="js/core/app-insights-init.js"></script>
</head>

<body>
    <!-- Header -->
    <header>
        <img src="images/logo.png" alt="Punkouter Software Logo" class="logo">
        <nav aria-label="Main navigation">
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="OurTeam.html">Our Team</a></li>
                <li><a href="OurWebApps.html" aria-current="page">Web Apps</a></li>
                <li><a href="OurPhoneApps.html">Phone Apps</a></li>
                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="apps-intro">
            <h1>Web Apps</h1>
            <p>Explore our collection of innovative web applications designed to solve real-world problems.</p>

            <!-- Sort Controls -->
            <div class="controls-bar">
                <div class="sort-control">
                    <label for="sort-select">Sort by:</label>
                    <select id="sort-select" class="sort-dropdown">
                        <option value="alphabetical">Alphabetical (A-Z)</option>
                        <option value="status">Status (Active First)</option>
                    </select>
                </div>
                <div class="app-count">
                    <span id="app-count-text">Loading apps...</span>
                </div>
            </div>

            <!-- Apps Grid - Dynamically loaded from JSON -->
            <div class="apps-grid">
                <!-- App cards will be loaded here by JavaScript -->
            </div>
        </section>
    </main>
    
    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Punkouter Software. All rights reserved.</p>
    </footer>
