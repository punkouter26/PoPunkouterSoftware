name: CI

# Lightweight pull-request gate: build the solution and run the fast test tiers
# (Unit + Integration). The E2E tiers (E2EAPI / E2EUI) need a running host and a
# Playwright browser, so they are intentionally excluded here and stay manual.
# The deploy pipeline (deploy.yml) remains build-and-deploy only.
on:
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel superseded runs for the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_NOLOGO: 'true'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0   # full history so MinVer can compute the version from tags

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore PoPunkouterSoftware.sln --nologo

      - name: Build
        run: dotnet build PoPunkouterSoftware.sln -c Release --no-restore --nologo

      # Integration tests spin up an ephemeral Azurite container via Testcontainers;
      # the ubuntu-latest runner ships with Docker, so no extra service setup is needed.
      - name: Unit tests
        run: dotnet test tests/UnitTests/PoPunkouterSoftware.UnitTests.csproj -c Release --no-build --nologo

      - name: Integration tests
        run: dotnet test tests/IntegrationTests/PoPunkouterSoftware.IntegrationTests.csproj -c Release --no-build --nologo
