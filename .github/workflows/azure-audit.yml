name: Azure Audit & Dashboard Update

# Runs on a schedule (daily at 06:00 UTC) and can be triggered manually.
# Generates azure-full-report.json and commits it to wwwroot/data/ so the
# AzureDashboard.html page on the SWA always shows fresh data.

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # manual trigger from the Actions tab

permissions:
  contents: write          # needed to commit the updated JSON

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Run Azure Audit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Log in to Azure using a Service Principal stored as a GitHub secret.
      # Required secrets:
      #   AZURE_CLIENT_ID     – Service Principal Application (client) ID
      #   AZURE_CLIENT_SECRET – Service Principal secret
      #   AZURE_TENANT_ID     – Azure AD tenant ID
      #   AZURE_SUBSCRIPTION_ID – Target subscription ID
      #
      # Create the SP with Reader + Cost Management Reader roles:
      #   az ad sp create-for-rbac --name "github-azure-audit" \
      #     --role "Cost Management Reader" \
      #     --scopes /subscriptions/<SUB_ID> \
      #     --sdk-auth
      - name: Azure CLI login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Run full Azure audit
        run: npm run azure-report

      # Copy the generated report into the static assets folder
      - name: Copy report to wwwroot/data
        run: |
          mkdir -p PoPunkouterSoftware/wwwroot/data
          cp azure-full-report.json PoPunkouterSoftware/wwwroot/data/azure-full-report.json

      # Commit and push only if the report changed
      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PoPunkouterSoftware/wwwroot/data/azure-full-report.json
          if git diff --cached --quiet; then
            echo "No changes to report — skipping commit."
          else
            git commit -m "chore: update azure-full-report.json [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
