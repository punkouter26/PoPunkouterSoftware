name: Deploy to Azure App Service

# Trigger only on push to master and manual dispatch.
# Pull-request builds are handled by a separate lightweight CI workflow (ci.yml).
on:
  push:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs of the same workflow on the same ref.
concurrency:
  group: deploy-popunkoutersoftware-${{ github.ref }}
  cancel-in-progress: true

# Minimum scopes for OIDC deployment; everything else is denied.
permissions:
  id-token: write
  contents: read

# All values come from the GitHub Environment "production" — never hardcode.
# Required environment secrets/vars (configure in Settings → Environments → production):
#   AZURE_CLIENT_ID            (secret) — User-assigned MI for OIDC
#   AZURE_TENANT_ID            (secret)
#   AZURE_SUBSCRIPTION_ID      (secret)
#   AZURE_APP_NAME             (variable) — e.g. app-popunkoutersoftware
#   AZURE_WEBAPP_SLOT          (variable, optional) — default 'production'
env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_NOLOGO: 'true'
  # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 keeps Azure actions on the maintained Node 24 runtime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Pin to the production environment so its protection rules / approval gates apply.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0   # full history so MinVer can compute the version from tags

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore PoPunkouterSoftware.sln --nologo

      - name: Build
        run: dotnet build PoPunkouterSoftware.sln -c Release --no-restore --nologo

      - name: Publish
        run: dotnet publish PoPunkouterSoftware/PoPunkouterSoftware.csproj -c Release --no-restore -o ./publish --nologo

      - name: Validate deploy targets
        if: vars.AZURE_APP_NAME == ''
        run: |
          echo "::error::Missing AZURE_APP_NAME environment variable. Configure the 'production' environment with the AZURE_APP_NAME variable."
          exit 1

      - name: Azure Login (OIDC)
        if: secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != ''
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3.0.8
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          slot-name: ${{ vars.AZURE_WEBAPP_SLOT || 'production' }}
          package: ./publish
