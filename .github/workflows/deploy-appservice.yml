name: Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-popunkoutersoftware-master
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: app-popunkoutersoftware
      RESOURCE_GROUP: PoPunkouterSoftware
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish PoPunkouterSoftware/PoPunkouterSoftware.csproj -c Release -o ./publish

      - name: Zip publish output
        run: cd ./publish && zip -r ../deploy.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        shell: bash
        run: |
          az webapp deploy --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" --src-path ./deploy.zip --type zip --clean true
          az webapp restart --name "$APP_NAME" --resource-group "$RESOURCE_GROUP"

      - name: Verify health endpoint
        shell: bash
        run: |
          for i in {1..24}; do
            if curl -fsS "https://${APP_NAME}.azurewebsites.net/health" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app warm-up ($i/24)..."
            sleep 10
          done
          echo "Health check failed"
          exit 1
