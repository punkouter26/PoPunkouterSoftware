name: Deploy to Azure App Service

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-popunkoutersoftware-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: app-popunkoutersoftware

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore PoPunkouterSoftware.sln

      - name: Build
        run: dotnet build PoPunkouterSoftware.sln -c Release --no-restore

      - name: Verify formatting
        run: dotnet format PoPunkouterSoftware.sln --verify-no-changes --verbosity minimal

      - name: Unit Tests
        run: dotnet test tests/PoPunkouterSoftware.Tests.Unit/PoPunkouterSoftware.Tests.Unit.csproj -c Release --no-build --logger "trx;LogFileName=unit-results.trx" --results-directory ./TESTRESULTS

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: ./TESTRESULTS/*.trx

      - name: Publish
        run: dotnet publish PoPunkouterSoftware/PoPunkouterSoftware.csproj -c Release --no-restore -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: published-app
          path: ./publish
          retention-days: 1

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 20
    env:
      HAS_OIDC: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
      HAS_AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS != '' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: published-app
          path: ./publish

      - name: Azure Login (OIDC)
        if: ${{ env.HAS_OIDC == 'true' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Login (Service Principal JSON)
        if: ${{ env.HAS_OIDC != 'true' && env.HAS_AZURE_CREDENTIALS == 'true' }}
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Azure auth secrets
        if: ${{ env.HAS_OIDC != 'true' && env.HAS_AZURE_CREDENTIALS != 'true' }}
        run: |
          echo "::error::Missing Azure auth secrets. Configure either OIDC secrets (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID) or AZURE_CREDENTIALS."
          exit 1

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: ./publish

