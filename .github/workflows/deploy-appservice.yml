name: Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-popunkoutersoftware-master
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: app-popunkoutersoftware
      RESOURCE_GROUP: PoPunkouterSoftware
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish PoPunkouterSoftware/PoPunkouterSoftware.csproj -c Release -o ./publish

      - name: Zip publish output
        run: cd ./publish && zip -r ../deploy.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure container startup timeout is sufficient
        shell: bash
        run: |
          az webapp config appsettings set --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --settings WEBSITE_CONTAINER_START_TIME_LIMIT=600 --output none

      - name: Stop app before deploy
        shell: bash
        run: |
          echo "Stopping app to clear any running background tasks..."
          az webapp stop --name "$APP_NAME" --resource-group "$RESOURCE_GROUP"
          sleep 5

      - name: Deploy to Azure App Service
        shell: bash
        run: |
          az webapp deploy --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" --src-path ./deploy.zip --type zip --clean true --async

      - name: Start app after deploy
        shell: bash
        run: |
          az webapp start --name "$APP_NAME" --resource-group "$RESOURCE_GROUP"

      - name: Verify health endpoint
        shell: bash
        run: |
          for i in {1..36}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "https://${APP_NAME}.azurewebsites.net/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Waiting for app warm-up ($i/36, status=$STATUS)..."
            sleep 10
          done
          echo "Health check failed after 6 minutes"
          exit 1
