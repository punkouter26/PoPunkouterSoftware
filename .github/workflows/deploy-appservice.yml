name: Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-popunkoutersoftware-master
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: app-popunkoutersoftware
      RESOURCE_GROUP: PoPunkouterSoftware
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish PoPunkouterSoftware/PoPunkouterSoftware.csproj -c Release -o ./publish

      - name: Zip publish output
        run: cd ./publish && zip -r ../deploy.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure container startup timeout is sufficient
        shell: bash
        run: |
          az webapp config appsettings set --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --settings WEBSITE_CONTAINER_START_TIME_LIMIT=600 --output none

      - name: Stop app before deploy
        shell: bash
        run: |
          echo "Stopping app to clear any running background tasks..."
          az webapp stop --name "$APP_NAME" --resource-group "$RESOURCE_GROUP"
          sleep 5

      - name: Deploy to Azure App Service
        shell: bash
        run: |
          # Use Kudu REST API directly — returns immediately after upload (no startup polling)
          TOKEN=$(az account get-access-token --resource https://management.azure.com --query accessToken -o tsv)
          HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            "https://${APP_NAME}.scm.azurewebsites.net/api/zipdeploy?isAsync=true&clean=true" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @./deploy.zip)
          echo "Kudu zip deploy HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != "2"* ]]; then
            echo "Deploy failed with HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Start app after deploy
        shell: bash
        run: |
          az webapp start --name "$APP_NAME" --resource-group "$RESOURCE_GROUP"

