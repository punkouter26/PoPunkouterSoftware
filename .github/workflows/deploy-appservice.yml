name: Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish PoPunkouterSoftware/PoPunkouterSoftware.csproj -c Release -o ./publish

      - name: Zip publish output
        run: cd ./publish && zip -r ../deploy.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: az webapp deploy --name app-popunkoutersoftware --resource-group PoPunkouterSoftware --src-path ./deploy.zip --type zip --async true
