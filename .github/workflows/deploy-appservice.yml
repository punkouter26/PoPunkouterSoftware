name: Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-popunkoutersoftware-master
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: app-popunkoutersoftware
      RESOURCE_GROUP: PoPunkouterSoftware
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish PoPunkouterSoftware/PoPunkouterSoftware.csproj -c Release -o ./publish

      - name: Zip publish output
        run: cd ./publish && zip -r ../deploy.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure container startup timeout is sufficient
        shell: bash
        run: |
          az webapp config appsettings set --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --settings WEBSITE_CONTAINER_START_TIME_LIMIT=600 --output none

      - name: Deploy to Azure App Service
        shell: bash
        run: |
          az webapp deploy --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --src-path ./deploy.zip --type zip --clean true

